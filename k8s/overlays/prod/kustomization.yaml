apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prod overlay — what ArgoCD's Application CR points at
# (k8s/overlays/prod). ArgoCD renders this kustomization and syncs the
# result into the aegis-greeter namespace.
resources:
  - ../../base
# Image — pinned BY DIGEST, not by tag (ADR-10 "build once, promote by
# digest"). The image is built ONCE in the aegis-greeter build CI and the
# immutable `sha256:` digest is promoted across environments unchanged — a
# git-sha tag is mutable-by-convention and lets a rebuild diverge between
# envs, so the artifact is identified by its content hash instead.
#
# Promotion path: build CI bumps the DIGEST in `overlays/staging` first; a
# promotion PR then copies the SAME digest into this prod overlay. ArgoCD
# detects the git change and syncs. See ../staging and the repo README.
#
# This `images:` entry owns EXCLUSIVELY the digest. The registry URL (it
# embeds the AWS account ID) is never written here: the platform's former
# `spec.source.kustomize.images` newName-only injection was empirically
# proven (kustomize v5.8.1) to DELETE this digest field and render
# `:latest`. The registry now arrives as the
# `aegis.binhsu.org/ecr-repository` annotation instead (see the
# registry-injection block below), spliced into the image's repo part by
# a `replacements` rule that preserves the digest.
images:
  - name: aegis-greeter
    # Placeholder digest. The promotion PR copies the verified staging
    # digest here verbatim:
    #   kustomize edit set image aegis-greeter@sha256:<digest>
    digest: "sha256:0e6f3e6b113bf12f9c4536caa9ccf8aa59351c066408eb1a750a7a97b73d2d28"
# Prod replica floor matches the base (2). HPA scales 2→10 on CPU.
# Staging overrides this to 1 (see ../staging) — same artifact, different
# config, which is the whole point of keeping env-diff in the overlay.

# Region injection (ADR-07 D3) — workload-owned, not platform-pushed.
#
# The platform ApplicationSet injects ONE generic annotation,
# `aegis.binhsu.org/region: <cluster region>` (kustomize.commonAnnotations).
# greeter consumes it HERE via kustomize `replacements` — the platform never
# learns greeter's internal deployment/container/ingress names.
#
# Standalone-build defaults for `aegis.binhsu.org/region` and
# `aegis.binhsu.org/ecr-repository` are declared as LITERAL annotations on
# the base Deployment (k8s/base/deployment.yaml metadata.annotations), NOT
# here in commonAnnotations. This is intentional: ArgoCD's injection runs
# `kustomize edit add annotation <k:v>` WITHOUT --force, and that command
# refuses keys already present in the kustomization file (caught live
# 2026-06-12: "annotation already in kustomization file. Use --force to
# override."). Keeping this kustomization annotation-free means ArgoCD's
# edit-add-annotation succeeds; the commonAnnotations transformer then
# overrides the base literals with the real platform-injected values at sync
# time. The replacements below source from the Deployment's
# metadata.annotations — which are the platform-injected values after a real
# sync, or the base literals for a standalone `kustomize build`.
#
# ⚠️ implemented, E2E PENDING platform bootstrap — confirm at first sync that
# the injected region reaches HELLO_TAG + the latency annotations.
#
# Registry injection (ADR-10) — SAME channel as the region annotation.
# The platform ApplicationSet injects
# `aegis.binhsu.org/ecr-repository: <acct>.dkr.ecr.<region>.amazonaws.com/aegis-greeter`
# (full repo URL, NO tag/digest) via kustomize.commonAnnotations. The
# replacement below rewrites ONLY the part of the container image before
# the `@` (options: delimiter "@", index 0), so the digest pinned in
# `images:` above survives injection.

replacements:
  - source:
      kind: Deployment
      name: aegis-greeter
      fieldPath: metadata.annotations.[aegis.binhsu.org/region]
    targets:
      - select:
          kind: Deployment
          name: aegis-greeter
        fieldPaths:
          - spec.template.spec.containers.[name=greeter].env.[name=HELLO_TAG].value
      - select:
          kind: Ingress
          name: aegis-greeter
        fieldPaths:
          - metadata.annotations.[external-dns.alpha.kubernetes.io/set-identifier]
          - metadata.annotations.[external-dns.alpha.kubernetes.io/aws-region]
  - source:
      kind: Deployment
      name: aegis-greeter
      fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    targets:
      - select:
          kind: Deployment
          name: aegis-greeter
        fieldPaths:
          - spec.template.spec.containers.[name=greeter].image
        options:
          delimiter: "@"
          index: 0
