apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prod overlay — what ArgoCD's Application CR points at
# (k8s/overlays/prod). ArgoCD renders this kustomization and syncs the
# result into the aegis-greeter namespace.
resources:
  - ../../base
# Image — pinned BY DIGEST, not by tag (ADR-10 "build once, promote by
# digest"). The image is built ONCE in the aegis-greeter build CI and the
# immutable `sha256:` digest is promoted across environments unchanged — a
# git-sha tag is mutable-by-convention and lets a rebuild diverge between
# envs, so the artifact is identified by its content hash instead.
#
# Promotion path: build CI bumps the DIGEST in `overlays/staging` first; a
# promotion PR then copies the SAME digest into this prod overlay. ArgoCD
# detects the git change and syncs. See ../staging and the repo README.
#
# Registry — GHCR, static ref (2026-07-21 migration off AWS ECR; see
# aegis-platform-aws ADR-24, mirroring ADR-23's aegis-core precedent).
# `ghcr.io/binhsu/aegis-greeter` is a public ref with no account id and no
# region, so — unlike the old ECR path — the platform has nothing to inject:
# `newName` is committed directly, here, instead of being spliced in at sync
# time. This ALSO ends ADR-12's registry-injection channel for greeter (the
# `aegis.binhsu.org/ecr-repository` annotation/replacement is removed below).
#
# Pinned by digest (ADR-10 "build once, promote by digest"). Promoted to a real
# GHCR digest on 2026-07-23 (hygiene promotion — replaces the retired ECR-era
# digest that never existed in GHCR). This is CONFIG-ONLY: no live cluster has
# been stood up and nothing has been deployed (E2E PENDING platform bootstrap,
# per argocd/application.yaml). When prod is eventually stood up for real, run a
# fresh staging-verified promotion first per the normal gated flow.
images:
  - name: aegis-greeter
    newName: ghcr.io/binhsu/aegis-greeter
    # Promoted from staging's verified GHCR digest. Kept in sync via:
    #   kustomize edit set image aegis-greeter=ghcr.io/binhsu/aegis-greeter@sha256:<digest>
    digest: "sha256:a88c668d51fd60f0c297ba13cf43e199c1d9a35237884176526a5e5401de5350"
# Prod replica floor matches the base (2). HPA scales 2→10 on CPU.
# Staging overrides this to 1 (see ../staging) — same artifact, different
# config, which is the whole point of keeping env-diff in the overlay.

# Region injection (ADR-07 D3) — workload-owned, not platform-pushed.
#
# The platform ApplicationSet injects ONE generic annotation,
# `aegis.binhsu.org/region: <cluster region>` (kustomize.commonAnnotations).
# greeter consumes it HERE via kustomize `replacements` — the platform never
# learns greeter's internal deployment/container/ingress names.
#
# Standalone-build default for `aegis.binhsu.org/region` is declared as a
# LITERAL annotation on the base Deployment (k8s/base/deployment.yaml
# metadata.annotations), NOT here in commonAnnotations. This is intentional:
# ArgoCD's injection runs `kustomize edit add annotation <k:v>` WITHOUT
# --force, and that command refuses keys already present in the
# kustomization file (caught live 2026-06-12: "annotation already in
# kustomization file. Use --force to override."). Keeping this kustomization
# annotation-free means ArgoCD's edit-add-annotation succeeds; the
# commonAnnotations transformer then overrides the base literal with the
# real platform-injected value at sync time.
#
# ⚠️ implemented, E2E PENDING platform bootstrap — confirm at first sync that
# the injected region reaches HELLO_TAG + the latency annotations.
#
# Registry — NO LONGER an injected annotation (2026-07-21 GHCR migration,
# aegis-platform-aws ADR-24). `images.newName` above is the full static
# GHCR ref, committed directly, mirroring aegis-core's ADR-23 GHCR move. The
# base Deployment's `aegis.binhsu.org/ecr-repository` literal annotation
# (k8s/base/deployment.yaml) is now vestigial — nothing here reads it.

replacements:
  - source:
      kind: Deployment
      name: aegis-greeter
      fieldPath: metadata.annotations.[aegis.binhsu.org/region]
    targets:
      - select:
          kind: Deployment
          name: aegis-greeter
        fieldPaths:
          - spec.template.spec.containers.[name=greeter].env.[name=HELLO_TAG].value
      - select:
          kind: Ingress
          name: aegis-greeter
        fieldPaths:
          - metadata.annotations.[external-dns.alpha.kubernetes.io/set-identifier]
          - metadata.annotations.[external-dns.alpha.kubernetes.io/aws-region]
