apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Staging overlay — the first stop in the promotion path (ADR-10). The
# aegis-greeter build CI bumps THIS overlay's image digest on every build;
# the platform ApplicationSet renders it into the aegis-staging cluster.
# Once verified here, a promotion PR copies the SAME digest into
# overlays/prod. ArgoCD reconciles each overlay independently.
resources:
- ../../base
# Image — pinned BY DIGEST (ADR-10 "build once, promote by digest"). The
# build CI writes the real digest here, in place, with:
#   kustomize edit set image aegis-greeter@sha256:<digest>
# run inside this directory — which rewrites the `digest` field below.
#
# This `images:` entry owns EXCLUSIVELY the digest. The registry URL (it
# embeds the AWS account ID) is never written here: the platform's former
# `spec.source.kustomize.images` newName-only injection was empirically
# proven (kustomize v5.8.1) to DELETE this digest field and render
# `:latest`. The registry now arrives as the
# `aegis.binhsu.org/ecr-repository` annotation instead (see the
# registry-injection block below), spliced into the image's repo part by
# a `replacements` rule that preserves the digest.
    # Placeholder digest. Build CI overwrites it (see above).
images:
- digest: sha256:46c38386ed5d3cd7fa4d5599ca73ecc758ef916ec79b3cd022201d022907f2a0
  name: aegis-greeter
# Env-diff lives in the overlay, NOT in the artifact (ADR-10). Staging runs
# a leaner footprint than prod: one replica instead of the base floor of two.
# The deliberate difference proves the image is identical across envs and
# only config changes between them.
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: aegis-greeter
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
  target:
    kind: HorizontalPodAutoscaler
    name: aegis-greeter

# Region injection (ADR-07 D3) — workload-owned, not platform-pushed.
#
# The platform ApplicationSet injects ONE generic annotation,
# `aegis.binhsu.org/region: <cluster region>` (kustomize.commonAnnotations).
# greeter consumes it HERE via kustomize `replacements` — the platform never
# learns greeter's internal deployment/container/ingress names. The default
# below (`local`) keeps a standalone `kustomize build` working; ArgoCD
# overrides the same annotation key with the real region at sync, and the
# annotations transformer runs before the replacement transformer, so the
# replacement reads the injected value.
#
# ⚠️ implemented, E2E PENDING platform bootstrap — confirm at first sync that
# the injected region reaches HELLO_TAG + the latency annotations.
#
# Registry injection (ADR-10) — SAME channel as the region annotation.
# The platform ApplicationSet injects
# `aegis.binhsu.org/ecr-repository: <acct>.dkr.ecr.<region>.amazonaws.com/aegis-greeter`
# (full repo URL, NO tag/digest) via kustomize.commonAnnotations. The
# replacement below rewrites ONLY the part of the container image before
# the `@` (options: delimiter "@", index 0), so the digest pinned in
# `images:` above survives injection — unlike the old kustomize.images
# newName override, which wiped it. The default (`aegis-greeter`) keeps a
# standalone `kustomize build` rendering `aegis-greeter@sha256:<digest>`.
commonAnnotations:
  aegis.binhsu.org/ecr-repository: aegis-greeter
  aegis.binhsu.org/region: local

replacements:
- source:
    fieldPath: metadata.annotations.[aegis.binhsu.org/region]
    kind: Deployment
    name: aegis-greeter
  targets:
  - fieldPaths:
    - spec.template.spec.containers.[name=greeter].env.[name=HELLO_TAG].value
    select:
      kind: Deployment
      name: aegis-greeter
  - fieldPaths:
    - metadata.annotations.[external-dns.alpha.kubernetes.io/set-identifier]
    - metadata.annotations.[external-dns.alpha.kubernetes.io/aws-region]
    select:
      kind: Ingress
      name: aegis-greeter
- source:
    fieldPath: metadata.annotations.[aegis.binhsu.org/ecr-repository]
    kind: Deployment
    name: aegis-greeter
  targets:
  - fieldPaths:
    - spec.template.spec.containers.[name=greeter].image
    options:
      delimiter: '@'
    select:
      kind: Deployment
      name: aegis-greeter
