apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Staging overlay — the first stop in the promotion path (ADR-10). The
# aegis-greeter build CI bumps THIS overlay's image digest on every build;
# the platform ApplicationSet renders it into the aegis-staging cluster.
# Once verified here, a promotion PR copies the SAME digest into
# overlays/prod. ArgoCD reconciles each overlay independently.
resources:
- ../../base
# Image — pinned BY DIGEST (ADR-10 "build once, promote by digest"). The
# build CI writes the real digest here, in place, with:
#   kustomize edit set image aegis-greeter@sha256:<digest>
# run inside this directory — which rewrites the `digest` field below.
#
# Registry — GHCR, static ref (2026-07-21 migration off AWS ECR; see
# aegis-platform-aws ADR-24, mirroring ADR-23's aegis-core precedent).
# `ghcr.io/binhsu/aegis-greeter` is a public ref with no account id and no
# region, so — unlike the old ECR path — the platform has nothing to inject:
# `newName` is committed directly, here, instead of being spliced in at sync
# time. This ALSO ends ADR-12's registry-injection channel for greeter (the
# `aegis.binhsu.org/ecr-repository` annotation/replacement is removed below;
# the annotation may still land on the Deployment from an unmigrated platform
# ApplicationSet, but nothing here consumes it anymore, so it's inert).
#
# ⚠️ FOLLOW-UP (ordering — do not skip): the digest below was promoted from
# the OLD ECR-hosted image. It does not exist in GHCR — no bytes were ever
# pushed there under this digest. It self-heals the moment aegis-greeter's
# GHCR-native publish.yml next runs (push to its main): that workflow
# overwrites this exact line via `kustomize edit set image
# aegis-greeter@sha256:<new-ghcr-digest>` and opens/auto-merges the bump PR,
# same as always. Until that next run lands, this overlay renders an
# unpullable ref (ImagePullBackOff) — acceptable here because staging has
# never been synced by a live cluster yet (ArgoCD reconcile is still E2E
# PENDING platform bootstrap, per argocd/application.yaml). If staging is
# ever live BEFORE that next CI run, trigger a push to aegis-greeter's main
# (or a manual `kustomize edit set image` here with a real GHCR digest)
# before relying on this overlay.
images:
- digest: sha256:3168f677eb17c9662a5b0163833080a810afd32357786eee92731b71262684d1
  name: aegis-greeter
  newName: ghcr.io/binhsu/aegis-greeter
# Env-diff lives in the overlay, NOT in the artifact (ADR-10). Staging runs
# a leaner footprint than prod: one replica instead of the base floor of two.
# The deliberate difference proves the image is identical across envs and
# only config changes between them.
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: aegis-greeter
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
  target:
    kind: HorizontalPodAutoscaler
    name: aegis-greeter

# Region injection (ADR-07 D3) — workload-owned, not platform-pushed.
#
# The platform ApplicationSet injects ONE generic annotation,
# `aegis.binhsu.org/region: <cluster region>` (kustomize.commonAnnotations).
# greeter consumes it HERE via kustomize `replacements` — the platform never
# learns greeter's internal deployment/container/ingress names.
#
# Standalone-build default for `aegis.binhsu.org/region` is declared as a
# LITERAL annotation on the base Deployment (k8s/base/deployment.yaml
# metadata.annotations), NOT here in commonAnnotations. This is intentional:
# ArgoCD's injection runs `kustomize edit add annotation <k:v>` WITHOUT
# --force, and that command refuses keys already present in the
# kustomization file (caught live 2026-06-12: "annotation already in
# kustomization file. Use --force to override."). Keeping this kustomization
# annotation-free means ArgoCD's edit-add-annotation succeeds; the
# commonAnnotations transformer then overrides the base literal with the
# real platform-injected value at sync time.
#
# ⚠️ implemented, E2E PENDING platform bootstrap — confirm at first sync that
# the injected region reaches HELLO_TAG + the latency annotations.
#
# Registry — NO LONGER an injected annotation (2026-07-21 GHCR migration,
# aegis-platform-aws ADR-24). `images.newName` above is the full static
# GHCR ref, committed directly, mirroring aegis-core's ADR-23 GHCR move. The
# base Deployment's `aegis.binhsu.org/ecr-repository` literal annotation
# (k8s/base/deployment.yaml) is now vestigial — nothing here reads it.

replacements:
- source:
    fieldPath: metadata.annotations.[aegis.binhsu.org/region]
    kind: Deployment
    name: aegis-greeter
  targets:
  - fieldPaths:
    - spec.template.spec.containers.[name=greeter].env.[name=HELLO_TAG].value
    select:
      kind: Deployment
      name: aegis-greeter
  - fieldPaths:
    - metadata.annotations.[external-dns.alpha.kubernetes.io/set-identifier]
    - metadata.annotations.[external-dns.alpha.kubernetes.io/aws-region]
    select:
      kind: Ingress
      name: aegis-greeter
