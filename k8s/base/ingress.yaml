apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-greeter
  namespace: aegis-greeter
  labels:
    app.kubernetes.io/name: aegis-greeter
    app.kubernetes.io/part-of: aegis-platform
  annotations:
    # AWS Load Balancer Controller — provisions an internet-facing ALB,
    # routing to pods directly (target-type ip; no NodePort hop).
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # ALB access logs: deferred. The S3 bucket is provisioned in the
    # platform/ env, but enabling `access_logs.s3.enabled` requires
    # `access_logs.s3.bucket=<name>` too — and that name embeds the AWS
    # account ID, which cannot be committed (anonymization policy). Wire
    # it via an operator-local overlay patch with the real bucket name.
    # See docs/tradeoffs.md.
    # external-dns (deferred — see regional-stack module README): when
    # installed, this annotation drives a Route 53 A-alias record under
    # the platform-owned hosted zone. Default is the staging subdomain;
    # the prod overlay patches this to greeter.prod.aws.binhsu.org.
    external-dns.alpha.kubernetes.io/hostname: greeter.staging.aws.binhsu.org
    # Cross-region latency routing — each region's ALB is one latency-routed
    # member of the shared hostname. set-identifier + aws-region carry the
    # serving region; the values default to "local" here and are rewritten to
    # the real region by the prod overlay's kustomize `replacements`, sourced
    # from the platform-injected `aegis.binhsu.org/region` annotation (ADR-07
    # D3 — region injection is workload-owned via kustomize, not platform-side
    # per-workload config). evaluate-target-health drops the record when the
    # ALB is gone (region failover).
    # ⚠️ implemented, E2E PENDING platform bootstrap.
    external-dns.alpha.kubernetes.io/set-identifier: "local"
    external-dns.alpha.kubernetes.io/aws-region: "local"
    external-dns.alpha.kubernetes.io/aws-evaluate-target-health: "true"
spec:
  ingressClassName: alb
  rules:
    # DNS host. Base default is the staging subdomain; the prod overlay patches
    # it to greeter.prod.aws.binhsu.org (mirrors the aegis-api.*.aws.binhsu.org
    # pattern in aegis-core-deploy/k8s/components/aws-binding/gateway-ingress.yaml).
    - host: greeter.staging.aws.binhsu.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-greeter
                port:
                  name: http
