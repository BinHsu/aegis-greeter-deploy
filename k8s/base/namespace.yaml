apiVersion: v1
kind: Namespace
metadata:
  name: aegis-greeter
  labels:
    app.kubernetes.io/part-of: aegis-stateless
    # PodSecurity Standards — PSP is deprecated; PSS is the K8s-native
    # replacement, built into kube-apiserver since 1.25. No admission
    # controller install needed. `restricted` is the most-strict tier.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
