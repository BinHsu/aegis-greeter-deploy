apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-greeter
  namespace: aegis-greeter
  labels:
    app.kubernetes.io/name: aegis-greeter
    app.kubernetes.io/part-of: aegis-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-greeter
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
