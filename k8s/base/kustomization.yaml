apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - networkpolicy.yaml

# `labels` (not the legacy `commonLabels`) with includeSelectors:false —
# adds the label to resource metadata only, NOT to Deployment/Service
# selectors (selectors are immutable after creation; polluting them with
# a managed-by label would block future updates).
labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

