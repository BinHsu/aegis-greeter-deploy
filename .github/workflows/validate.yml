name: Validate

# Renders both kustomize overlays and enforces the ADR-10 release-model
# contract:
#
#   1. Digest-presence guard — every rendered Deployment image must be
#      pinned `@sha256:<64 hex>`. This is the regression test for the
#      kustomize.images wipe bug: the platform's old newName-only
#      `spec.source.kustomize.images` injection deleted the overlay's
#      digest field and rendered `:latest` (proven on kustomize v5.8.1).
#   2. Injection simulation — replays what the platform ApplicationSet
#      does at sync time (inject `aegis.binhsu.org/region` and
#      `aegis.binhsu.org/ecr-repository` via kustomize commonAnnotations)
#      and asserts the rendered image is `<repo URL>@<THE SAME digest the
#      standalone render pinned>`, i.e. the registry lands AND the exact
#      digest survives — not merely "some digest".
#
# `kubectl kustomize` is used as the renderer — kubectl ships on the
# ubuntu runner image with kustomize embedded (no extra tool install).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Render overlays + assert digest pin (wipe-bug guard)
        run: |
          set -euo pipefail
          for overlay in staging prod; do
            echo "=== k8s/overlays/${overlay} (standalone) ==="
            kubectl kustomize "k8s/overlays/${overlay}" > "rendered-${overlay}.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}.yaml")"
            echo "${image_lines}"
            # EVERY image line must be digest-pinned — a single stray
            # unpinned image (e.g. a future sidecar) must fail, so we
            # assert no line violates instead of "at least one matches".
            bad="$(echo "${image_lines}" | grep -Ev 'image: aegis-greeter@sha256:[0-9a-f]{64}$' || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: non-digest-pinned image line(s) (kustomize.images wipe regression?):"; echo "${bad}"; exit 1; }
            # Record the pinned digest; the injection step asserts the
            # SAME digest survives, not merely any digest.
            echo "${image_lines}" | head -1 | sed -E 's/.*@(sha256:[0-9a-f]{64})$/\1/' > "digest-${overlay}.txt"
          done

      - name: Simulate platform annotation injection + assert digest survives
        run: |
          set -euo pipefail
          # Replay the ArgoCD-side injection: the platform ApplicationSet
          # sets these two commonAnnotations keys at sync time, overriding
          # the overlay defaults ("local" / "aegis-greeter").
          REGION="eu-central-1"
          ECR_REPO="123456789012.dkr.ecr.${REGION}.amazonaws.com/aegis-greeter"
          for overlay in staging prod; do
            echo "=== k8s/overlays/${overlay} (injected) ==="
            digest="$(cat "digest-${overlay}.txt")"
            rm -rf /tmp/inject-sim
            cp -r k8s /tmp/inject-sim
            sed -i \
              -e "s|aegis.binhsu.org/region: \"local\"|aegis.binhsu.org/region: \"${REGION}\"|" \
              -e "s|aegis.binhsu.org/ecr-repository: \"aegis-greeter\"|aegis.binhsu.org/ecr-repository: \"${ECR_REPO}\"|" \
              "/tmp/inject-sim/overlays/${overlay}/kustomization.yaml"
            kubectl kustomize "/tmp/inject-sim/overlays/${overlay}" > "rendered-${overlay}-injected.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}-injected.yaml")"
            echo "${image_lines}"
            # Registry URL must land in front of THE SAME digest the
            # standalone render pinned, on every image line.
            bad="$(echo "${image_lines}" | grep -Fv "image: ${ECR_REPO}@${digest}" || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: injected render diverged from ${ECR_REPO}@${digest}:"; echo "${bad}"; exit 1; }
            # The region chain must still render — scoped to the HELLO_TAG
            # env var, not any stray `value:` field in the manifest.
            grep -A1 'name: HELLO_TAG' "rendered-${overlay}-injected.yaml" \
              | grep -Eq "value: ${REGION}\$" \
              || { echo "::error::${overlay}: injected region did not reach HELLO_TAG"; exit 1; }
          done
