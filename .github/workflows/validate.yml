name: Validate

# Renders both kustomize overlays and enforces the ADR-10 release-model
# contract:
#
#   1. Digest-presence guard — every rendered Deployment image must be
#      pinned `ghcr.io/binhsu/aegis-greeter@sha256:<64 hex>`. This is the
#      regression test for the kustomize.images wipe bug: the platform's old
#      newName-only `spec.source.kustomize.images` injection deleted the
#      overlay's digest field and rendered `:latest` (proven on kustomize
#      v5.8.1). The registry is now a static ref committed in each overlay's
#      `images.newName` (2026-07-21 GHCR migration, aegis-platform-aws
#      ADR-24) — this step also guards that nothing reintroduces a bare/ECR
#      name.
#   2. Injection simulation — replays what the platform ApplicationSet does
#      at sync time (inject `aegis.binhsu.org/region` via `kustomize edit add
#      annotation` WITHOUT --force — exactly as ArgoCD does), asserts the
#      injected region reached HELLO_TAG, AND asserts the rendered image is
#      UNCHANGED (still the static GHCR ref@digest) even when the now-inert
#      `aegis.binhsu.org/ecr-repository` annotation is also injected — this
#      is the regression guard for the ADR-24 decoupling: nothing in this
#      overlay may consume that annotation again.
#
#      Using the real kustomize edit mechanism (not sed) means CI catches
#      exactly the conflict class that broke ArgoCD on 2026-06-12: if the
#      overlay kustomization file declares a key that ArgoCD tries to inject,
#      this step fails with "annotation already in kustomization file. Use
#      --force to override." — the same error ArgoCD surfaces.
#
# kustomize v5.8.1 linux/amd64 is downloaded once, sha256-verified, and
# reused across both overlay loops. `kubectl kustomize` (shipped on the
# ubuntu runner) is used for the standalone render; the standalone-installed
# kustomize binary is used for the injection simulation (edit + build).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install kustomize v5.8.1 (pinned sha256)
        run: |
          set -euo pipefail
          # Download the official release tarball, verify its sha256, then
          # extract the binary. The checksum was recorded from the release's
          # checksums.txt at the time this workflow was authored; it must
          # match exactly — any divergence aborts the job before any code runs.
          KUSTOMIZE_VERSION="v5.8.1"
          KUSTOMIZE_TARBALL="kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          KUSTOMIZE_URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/${KUSTOMIZE_TARBALL}"
          KUSTOMIZE_SHA256="029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
          curl -fsSL "${KUSTOMIZE_URL}" -o "/tmp/${KUSTOMIZE_TARBALL}"
          echo "${KUSTOMIZE_SHA256}  /tmp/${KUSTOMIZE_TARBALL}" | sha256sum --check
          tar -xzf "/tmp/${KUSTOMIZE_TARBALL}" -C /usr/local/bin kustomize
          kustomize version

      - name: Render overlays + assert digest pin (wipe-bug guard)
        run: |
          set -euo pipefail
          for overlay in staging prod; do
            echo "=== k8s/overlays/${overlay} (standalone) ==="
            kubectl kustomize "k8s/overlays/${overlay}" > "rendered-${overlay}.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}.yaml")"
            echo "${image_lines}"
            # EVERY image line must be digest-pinned to the static GHCR ref —
            # a single stray unpinned image (e.g. a future sidecar) must
            # fail, so we assert no line violates instead of "at least one
            # matches".
            bad="$(echo "${image_lines}" | grep -Ev 'image: ghcr\.io/binhsu/aegis-greeter@sha256:[0-9a-f]{64}$' || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: non-digest-pinned image line(s) (kustomize.images wipe regression?):"; echo "${bad}"; exit 1; }
            # Record the pinned digest; the injection step asserts the
            # SAME digest survives, not merely any digest.
            echo "${image_lines}" | head -1 | sed -E 's/.*@(sha256:[0-9a-f]{64})$/\1/' > "digest-${overlay}.txt"
          done

      - name: Simulate platform annotation injection + assert image unaffected
        run: |
          set -euo pipefail
          # Replay the ArgoCD-side injection using the REAL kustomize mechanism:
          # `kustomize edit add annotation <k:v>` WITHOUT --force — exactly as
          # ArgoCD's ApplicationSet runs it. If an overlay kustomization file
          # still declares these keys (i.e. the fix regressed), this step will
          # fail with "annotation already in kustomization file. Use --force to
          # override." — the same error ArgoCD surfaces — catching the conflict
          # class before it reaches the cluster.
          #
          # The ecr-repository annotation is injected here TOO, even though
          # staging/prod no longer consume it (ADR-24) — an unmigrated
          # platform ApplicationSet may still write it as harmless dead data.
          # Injecting it and asserting the image DOESN'T change is the
          # regression guard: it fails loud if a `replacements` rule
          # consuming this annotation is ever reintroduced into these
          # overlays without also removing the static `images.newName`,
          # which would silently reproduce the ADR-12 registry-vs-digest
          # collision this repo already fixed once (2026-06-12).
          REGION="eu-central-1"
          STALE_ECR_REPO="162975888022.dkr.ecr.${REGION}.amazonaws.com/aegis-greeter"
          GHCR_IMAGE="ghcr.io/binhsu/aegis-greeter"
          for overlay in staging prod; do
            echo "=== k8s/overlays/${overlay} (injected) ==="
            digest="$(cat "digest-${overlay}.txt")"
            rm -rf /tmp/inject-sim
            cp -r k8s /tmp/inject-sim
            # Run kustomize edit add annotation (no --force) in the overlay dir,
            # exactly as ArgoCD does. This fails if the keys are already present
            # in the kustomization file — which is the regression we guard here.
            (
              cd "/tmp/inject-sim/overlays/${overlay}"
              kustomize edit add annotation \
                "aegis.binhsu.org/ecr-repository:${STALE_ECR_REPO}" \
                "aegis.binhsu.org/region:${REGION}"
            )
            kustomize build "/tmp/inject-sim/overlays/${overlay}" > "rendered-${overlay}-injected.yaml"
            image_lines="$(grep -E '^\s+image: ' "rendered-${overlay}-injected.yaml")"
            echo "${image_lines}"
            # The image must stay the static GHCR ref@digest — injecting the
            # (now-inert) ecr-repository annotation must NOT change it.
            bad="$(echo "${image_lines}" | grep -Fv "image: ${GHCR_IMAGE}@${digest}" || true)"
            [ -z "${bad}" ] \
              || { echo "::error::${overlay}: injected render diverged from ${GHCR_IMAGE}@${digest} — the ecr-repository annotation is being consumed again (ADR-24 regression):"; echo "${bad}"; exit 1; }
            # The region chain must still render — scoped to the HELLO_TAG
            # env var, not any stray `value:` field in the manifest.
            grep -A1 'name: HELLO_TAG' "rendered-${overlay}-injected.yaml" \
              | grep -Eq "value: ${REGION}\$" \
              || { echo "::error::${overlay}: injected region did not reach HELLO_TAG"; exit 1; }
          done
